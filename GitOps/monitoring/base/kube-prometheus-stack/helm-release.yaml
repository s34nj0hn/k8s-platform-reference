apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 70.3.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 1h
  values:
    alertmanager:
      alertmanagerSpec:
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
    grafana:
      enabled: true
      defaultDashboardsTimezone: browser
      resources:
        requests:
          cpu: 25m
          memory: 96Mi
      service:
        type: ClusterIP
    prometheus:
      prometheusSpec:
        retention: 2d
        retentionSize: 4GiB
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
    prometheusOperator:
      resources:
        requests:
          cpu: 25m
          memory: 96Mi
    kube-state-metrics:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi

apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod-should-fail
  namespace: demo-app
spec:
  restartPolicy: Never
  initContainers:
    - name: privileged-init
      image: busybox:1.36
      command:
        - "sh"
        - "-c"
        - "true"
      securityContext:
        privileged: true
  containers:
    - name: privileged-app
      image: nginx:1.25
      securityContext:
        privileged: true
